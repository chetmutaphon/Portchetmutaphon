<!-- @dsCard group="Colors" viewport="700x150" name="Theme accents" subtitle="One accent per identity — never more than one" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); }
  .row { display: flex; padding: 24px; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 60px; border-radius: 10px; display: flex; align-items: flex-end; padding: 8px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; }
  .n { font-size: 12px; font-weight: 600; }
  .v { font-family: var(--font-mono); font-size: 11px; color: #86868b; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#f5f5f7"><span class="dot" style="background:#1d1d1f"></span></div><span class="n">Apple Minimal</span><span class="v">#1d1d1f</span></div>
  <div class="sw"><div class="chip" style="background:#f0ece4"><span class="dot" style="background:#8a7054"></span></div><span class="n">Warm Editorial</span><span class="v">#8a7054</span></div>
  <div class="sw"><div class="chip" style="background:#e8ecf2"><span class="dot" style="background:#4361ee"></span></div><span class="n">Cool Studio</span><span class="v">#4361ee</span></div>
  <div class="sw"><div class="chip" style="background:#f0f0f0"><span class="dot" style="background:#000000"></span></div><span class="n">Ink &amp; Paper</span><span class="v">#000000</span></div>
</div>
</body>
</html>
