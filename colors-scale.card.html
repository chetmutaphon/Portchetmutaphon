<!-- @dsCard group="Colors" viewport="700x150" name="Ink & surface scale" subtitle="The grey-to-ink spine of the brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg); color: var(--text); }
  .row { display: flex; padding: 24px; gap: 14px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: 10px; border: 1px solid var(--border); }
  .n { font-size: 12px; font-weight: 600; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#ffffff"></div><span class="n">White</span><span class="v">#ffffff</span></div>
  <div class="sw"><div class="chip" style="background:#f5f5f7"></div><span class="n">Grey 50</span><span class="v">#f5f5f7</span></div>
  <div class="sw"><div class="chip" style="background:#d2d2d7"></div><span class="n">Grey 200</span><span class="v">#d2d2d7</span></div>
  <div class="sw"><div class="chip" style="background:#86868b"></div><span class="n">Grey 500</span><span class="v">#86868b</span></div>
  <div class="sw"><div class="chip" style="background:#1d1d1f"></div><span class="n">Ink 900</span><span class="v">#1d1d1f</span></div>
  <div class="sw"><div class="chip" style="background:#000000"></div><span class="n">Black</span><span class="v">#000000</span></div>
</div>
</body>
</html>
