<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4 → 48px step scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg); color: var(--text); }
  .row { display: flex; align-items: flex-end; gap: 18px; padding: 30px 32px; }
  .col { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
  .bar { background: var(--text); height: 16px; border-radius: 3px; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="width:4px"></div><span class="v">4</span></div>
  <div class="col"><div class="bar" style="width:8px"></div><span class="v">8</span></div>
  <div class="col"><div class="bar" style="width:12px"></div><span class="v">12</span></div>
  <div class="col"><div class="bar" style="width:16px"></div><span class="v">16</span></div>
  <div class="col"><div class="bar" style="width:20px"></div><span class="v">20</span></div>
  <div class="col"><div class="bar" style="width:24px"></div><span class="v">24</span></div>
  <div class="col"><div class="bar" style="width:32px"></div><span class="v">32</span></div>
  <div class="col"><div class="bar" style="width:40px"></div><span class="v">40</span></div>
  <div class="col"><div class="bar" style="width:48px"></div><span class="v">48</span></div>
</div>
</body>
</html>
