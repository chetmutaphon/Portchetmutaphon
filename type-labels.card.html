<!-- @dsCard group="Type" viewport="700x180" name="Labels & mono" subtitle="Tracked uppercase eyebrows and mono placeholder labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--bg); color: var(--text); }
  .wrap { padding: 28px 32px; display: flex; flex-direction: column; gap: 22px; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 6px; }
  .label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); font-weight: 600; }
  .mono { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; color: var(--text-secondary); font-weight: 500; }
  .nav { font-size: 14px; color: var(--text-secondary); letter-spacing: 0.01em; }
</style>
</head>
<body>
<div class="wrap">
  <div><div class="meta">Section label — 13px · 0.12em · 600</div><span class="label">Photography</span></div>
  <div><div class="meta">Mono placeholder label — 11px · 0.15em</div><span class="mono">BRAND IDENTITY</span></div>
  <div><div class="meta">Nav link — 14px · 0.01em</div><span class="nav">About&nbsp;&nbsp;&nbsp;Experience&nbsp;&nbsp;&nbsp;Artwork&nbsp;&nbsp;&nbsp;Photo</span></div>
</div>
</body>
</html>
